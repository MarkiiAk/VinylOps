<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="85%">
      <stop offset="0%" stop-color="#1a1024"/>
      <stop offset="55%" stop-color="#0a0710"/>
      <stop offset="100%" stop-color="#020204"/>
    </radialGradient>
    <linearGradient id="blade" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ecf7"/>
      <stop offset="55%" stop-color="#4fc9ff"/>
      <stop offset="100%" stop-color="#ad74ff"/>
    </linearGradient>
    <linearGradient id="bladeGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ecf7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ad74ff" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- fondo -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- rombo guia sutil (evoca hoja de plotter / material montado) -->
  <rect x="146" y="146" width="220" height="220" rx="28"
        transform="rotate(45 256 256)"
        fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="10"/>

  <!-- resplandor de la cuchilla -->
  <line x1="150" y1="362" x2="362" y2="150" stroke="url(#bladeGlow)" stroke-width="46" stroke-linecap="round"/>

  <!-- cuchilla / corte diagonal (elemento central de marca) -->
  <line x1="160" y1="352" x2="352" y2="160" stroke="url(#blade)" stroke-width="22" stroke-linecap="round"/>

  <!-- punta de la cuchilla -->
  <circle cx="352" cy="160" r="16" fill="#00ecf7"/>
  <circle cx="160" cy="352" r="16" fill="#ad74ff"/>
</svg>
